name: Soteria CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core -> target
      - name: Format check
        run: cargo fmt --check
        working-directory: rust-core
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust-core
      - name: Clippy desktop
        run: cargo clippy --all-targets -- -D warnings
        working-directory: desktop

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core -> target
      - name: TCB tests
        run: cargo test --all-targets
        working-directory: rust-core
      - name: Full-feature tests
        run: cargo test --all-targets --features full
        working-directory: rust-core

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit
        working-directory: rust-core

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core -> target
      - name: Build TCB
        run: cargo build --release
        working-directory: rust-core
      - name: Build with FIPS
        run: cargo build --release --features fips
        working-directory: rust-core
      - name: Build with OMEGA
        run: cargo build --release --features omega
        working-directory: rust-core
      - name: Upload TCB binary
        uses: actions/upload-artifact@v4
        with:
          name: soteriad-tcb-${{ matrix.os }}
          path: rust-core/target/release/soteriad*
      - name: Build desktop GUI (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release
        working-directory: desktop
      - name: Upload desktop GUI
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SoteriaAegis-${{ matrix.os }}
          path: desktop/target/release/SoteriaAegis.exe
      - name: Build portable ZIP (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging/portable/pack.ps1 -Config Release
        shell: pwsh
      - name: Upload portable ZIP
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SoteriaAegis-Portable-${{ matrix.os }}
          path: packaging/output/SoteriaAegis-Portable.zip
      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release
        working-directory: installer
      - name: Upload installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SoteriaAegis-Setup-${{ matrix.os }}
          path: installer/target/release/SoteriaAegis-Setup.exe

  release:
    name: Release
    needs: [lint, test, security, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            soteriad-ubuntu-latest/soteriad
            soteriad-windows-latest/soteriad.exe
            soteriad-macos-latest/soteriad
            SoteriaAegis-windows-latest/SoteriaAegis.exe
            SoteriaAegis-Portable-windows-latest/SoteriaAegis-Portable.zip
            SoteriaAegis-Setup-windows-latest/SoteriaAegis-Setup.exe
          generate_release_notes: true
