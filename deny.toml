# cargo-deny configuration for Soteria.
#
# `cargo deny` checks:
#   - advisories: known security advisories in the dependency tree.
#   - bans: forbidden crates / versions / features.
#   - licenses: license allow-list.
#   - sources: registry / source allow-list.
#
# Run:
#   cargo install cargo-deny
#   cargo deny check
#   cargo deny check advisories
#   cargo deny check licenses
#   cargo deny check bans

[advisories]
version = 2
# Fail the build if any advisory affects our deps. Use `--yanked` to
# also reject yanked versions.
yanked = "warn"
ignore = []
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # Crates we explicitly do not use.
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "libssl" },
    { name = "libcrypto" },
    { name = "libssh2-sys" },
    { name = "libgit2-sys" },
    { name = "capnp" },
    { name = "tokio" },                  # we use crossbeam-channel; tokio is forbidden
    { name = "async-std" },
    { name = "smol" },
    { name = "uuid" },                   # use std::time::SystemTime
    { name = "chrono" },
    { name = "rand_chacha" },            # we use rand directly
    { name = "nix" },                    # not cached; use libc directly
    { name = "libc" },                   # NOT a real ban; libc IS used.
]

# Skip some of the above; uncomment to actually enforce.
skip = [
    { name = "libc" },
]

skip-tree = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",          # acknowledgment required
    "Nominatum",        # map data license
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[[licenses.clarify]]
name = "rustls"
expression = "Apache-2.0 OR MIT OR ISC"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
